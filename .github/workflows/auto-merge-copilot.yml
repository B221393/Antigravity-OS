name: Auto Approve and Merge Copilot PRs

on:
  pull_request:
    types: [opened, ready_for_review, synchronized, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'copilot-swe-agent' || contains(github.event.pull_request.user.login, 'copilot')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ready for review (Draft -> Ready)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR is a draft, if so, mark it as ready for review
          if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
            gh pr ready ${{ github.event.pull_request.number }}
          fi

      - name: Approve PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve ${{ github.event.pull_request.number }}

      - name: Enable Auto-Merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to merge immediately or enable auto-merge if requirements are not met
          gh pr merge --auto --merge "${{ github.event.pull_request.number }}"
