<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS SEARCH | App #12</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Outfit', 'Noto Sans JP', sans-serif; color: #fff; }
        #search-container { position: absolute; top: 10%; left: 50%; transform: translate(-50%, -10%); width: 600px; text-align: center; z-index: 10; }
        input { 
            width: 100%; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px); color: #fff; border-radius: 50px; font-size: 1.2rem; outline: none; transition: 0.3s;
            text-align: center; letter-spacing: 2px;
        }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }
        #node-info { 
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 500px; 
            background: rgba(15, 23, 42, 0.8); padding: 30px; border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.3);
            display: none; box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
        }
        .meta-tag { font-size: 0.7rem; color: #38bdf8; letter-spacing: 2px; margin-bottom: 5px; }
        .title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .desc { font-size: 0.9rem; opacity: 0.8; line-height: 1.6; }
        #status { position: absolute; top: 30px; left: 30px; font-size: 0.6rem; letter-spacing: 2px; opacity: 0.4; }
    </style>
</head>
<body>
    <div id="status">ANTIGRAVITY-CORE V3 // SEARCH_PROTOCOL: ACTIVATED</div>
    <div id="search-container">
        <input type="text" id="search-input" placeholder="ENTER KEYWORD (e.g. PANASONIC, MAZDA...)" autocomplete="off">
    </div>
    <div id="node-info">
        <div class="meta-tag" id="node-tag">ENTITY_SIGNAL</div>
        <div class="title" id="node-title">NEXUS NODE</div>
        <div class="desc" id="node-desc">Analyzing data links...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, nodes = [];
        const data = [
            { name: "PANASONIC", type: "COMPANY", desc: "ES提出期限: 3/17。くらし事業、ソフトウェア設計(解析)。デジタルツインと3Dシミュレーションの強みを接続済み。", keywords: ["panasonic", "パナソニック", "パナ"] },
            { name: "MAZDA", type: "COMPANY", desc: "ステータス: 準備中。技術系・研究開発。広島。100年企業の実直さとエンジニアリングの調和。", keywords: ["mazda", "マツダ"] },
            { name: "PERSOL AVC", type: "COMPANY", desc: "ES提出期限: 3/17。設計開発。多様な製品開発への関与可能性。", keywords: ["persol", "パーソル", "avc"] },
            { name: "TECHNOPRO", type: "TASK", desc: "適性検査: 3/19。技術職要件。材料力学・解析工学の基礎知識の再確認を推奨。", keywords: ["technopro", "テクノプロ", "テスト"] },
            { name: "HORSE RIDING", type: "EXPERIENCE", desc: "馬術部での継続力と、現場でのトライアンドエラー。誠実さの証明としてESの中核をなす。", keywords: ["horse", "馬", "馬術"] },
            { name: "3D SIMULATION", type: "TECH", desc: "VECTISシステムのコア技術（Three.js）。視覚化と理解の架け橋としての自己拡張。", keywords: ["3d", "sim", "three", "シミュレーション"] }
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 250;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.SphereGeometry(2, 16, 16);
            data.forEach((item, i) => {
                const mat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.6 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(
                    (Math.random() - 0.5) * 300,
                    (Math.random() - 0.5) * 150 - 20,
                    (Math.random() - 0.5) * 100
                );
                mesh.userData = item;
                mesh.targetPos = mesh.position.clone();
                scene.add(mesh);
                nodes.push(mesh);
            });

            // Particles for ambient
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(500 * 3);
            for(let i=0; i<500*3; i++) pPos[i] = (Math.random()-0.5)*500;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({ color: 0x38bdf8, size: 0.5, transparent: true, opacity: 0.2 });
            scene.add(new THREE.Points(pGeo, pMat));

            document.getElementById('search-input').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                if (!query) {
                    resetNodes();
                    document.getElementById('node-info').style.display = 'none';
                    return;
                }

                nodes.forEach(node => {
                    const match = node.userData.keywords.some(k => k.includes(query)) || node.userData.name.toLowerCase().includes(query);
                    if (match) {
                        node.targetPos.set(0, -30, 50);
                        node.scale.set(3, 3, 3);
                        node.material.color.set(0xfbbf24);
                        node.material.opacity = 1.0;
                        showInfo(node.userData);
                    } else {
                        node.targetPos.set((Math.random()-0.5)*400, (Math.random()-0.5)*200, -100);
                        node.scale.set(0.5, 0.5, 0.5);
                        node.material.color.set(0x38bdf8);
                        node.material.opacity = 0.2;
                    }
                });
            });

            animate();
        }

        function resetNodes() {
            nodes.forEach(node => {
                node.targetPos.set((Math.random()-0.5)*300, (Math.random()-0.5)*150 - 20, (Math.random()-0.5)*100);
                node.scale.set(1, 1, 1);
                node.material.color.set(0x38bdf8);
                node.material.opacity = 0.6;
            });
        }

        function showInfo(info) {
            const panel = document.getElementById('node-info');
            panel.style.display = 'block';
            document.getElementById('node-tag').innerText = info.type + "_LINK";
            document.getElementById('node-title').innerText = info.name;
            document.getElementById('node-desc').innerText = info.desc;
        }

        function animate() {
            requestAnimationFrame(animate);
            nodes.forEach(node => {
                node.position.lerp(node.targetPos, 0.1);
            });
            scene.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
