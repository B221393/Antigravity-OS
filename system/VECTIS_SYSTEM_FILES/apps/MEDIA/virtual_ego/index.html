<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VIRTUAL EGO | 3D Space</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            pointer-events: none;
        }
    </style>
    <!-- THREE.JS CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="overlay">
        EGO SYSTEM: VIRTUAL INTERFACE<br>
        Controls: W/A/S/D to Move, SPACE/SHIFT to Up/Down<br>
        Status: ONLINE
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { FlyControls } from 'three/addons/controls/FlyControls.js';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.002);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. LIGHTING
        const ambientLight = new THREE.AmbientLight(0x404040); // Soft white light
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 3. OBJECTS (EGO NODES)

        // GRID
        const gridHelper = new THREE.GridHelper(200, 50, 0xff0033, 0x222222);
        scene.add(gridHelper);

        // MONOLITHS (System Modules)
        function createMonolith(x, z, color, name) {
            const geometry = new THREE.BoxGeometry(2, 10, 2);
            const material = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.9
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x, 5, z);

            // Wireframe
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
            cube.add(line);

            scene.add(cube);
            return cube;
        }

        const nodes = [];
        nodes.push(createMonolith(0, -20, 0xff0033, "CORE")); // Red Core
        nodes.push(createMonolith(-15, -10, 0x00ccff, "PATROL")); // Blue Patrol
        nodes.push(createMonolith(15, -10, 0x00ff88, "TOEIC")); // Green Learning
        nodes.push(createMonolith(0, 10, 0xffff00, "KIWIX")); // Yellow Knowledge

        // PARTICLES (Data Stream)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.1, color: 0x00ffff });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // 4. CONTROLS
        const controls = new FlyControls(camera, renderer.domElement);
        controls.movementSpeed = 20;
        controls.domElement = renderer.domElement;
        controls.rollSpeed = Math.PI / 24;
        controls.autoForward = false;
        controls.dragToLook = true;

        // 5. ANIMATION LOOP
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            controls.update(delta);

            // Rotate Nodes
            nodes.forEach((node, idx) => {
                node.rotation.y += 0.01 * (idx + 1);
            });

            // Pulse Particles
            particlesMesh.rotation.y += 0.001;

            renderer.render(scene, camera);
        }

        animate();

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
