<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Metroidvania Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2a; /* Dark, cold blue background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background-color: #0d0d15;
            border: 1px solid #00ffff; /* Cyan highlight */
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <script type="module">
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // --- Game Feel & Physics Constants ---
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12; // Initial upward force
        const JUMP_HOLD_FORCE = 0.5; // Upward force while holding jump key
        const MAX_JUMP_HOLD_TIME = 200; // ms
        const PLAYER_SPEED = 4;
        const FRICTION = 0.85;

        // --- Player State ---
        const player = {
            x: 100,
            y: 400,
            width: 32,
            height: 48,
            vx: 0,
            vy: 0,
            isGrounded: false,
            isJumping: false,
            jumpHoldTime: 0,
            color: '#00ffff' // Cyan player
        };

        // --- World Platforms ---
        const platforms = [
            { x: 0, y: 550, width: GAME_WIDTH, height: 50 }, // Ground
            { x: 200, y: 450, width: 150, height: 20 },
            { x: 450, y: 350, width: 200, height: 20 },
            { x: 250, y: 250, width: 100, height: 20 },
            { x: 0, y: 150, width: 150, height: 20 }
        ];
        const platformColor = '#9d4edd'; // Organic, yet alien purple

        // --- Input Handling ---
        const keys = {
            left: { pressed: false },
            right: { pressed: false },
            jump: { pressed: false }
        };

        window.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    keys.left.pressed = true;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    keys.right.pressed = true;
                    break;
                case 'Space':
                case 'KeyW':
                case 'ArrowUp':
                    keys.jump.pressed = true;
                    break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'ArrowLeft':
                case 'KeyA':
                    keys.left.pressed = false;
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    keys.right.pressed = false;
                    break;
                case 'Space':
                case 'KeyW':
                case 'ArrowUp':
                    keys.jump.pressed = false;
                    player.isJumping = false;
                    break;
            }
        });

        function handleInput() {
            // Horizontal movement
            if (keys.left.pressed) {
                player.vx = -PLAYER_SPEED;
            } else if (keys.right.pressed) {
                player.vx = PLAYER_SPEED;
            }

            // Jumping
            if (keys.jump.pressed && player.isGrounded) {
                player.vy = JUMP_FORCE;
                player.isGrounded = false;
                player.isJumping = true;
                player.jumpHoldTime = 0;
            }

            // Variable jump height ("Floaty" feel)
            if (keys.jump.pressed && player.isJumping && player.vy < 0) {
                 if (player.jumpHoldTime < MAX_JUMP_HOLD_TIME) {
                    player.vy += JUMP_HOLD_FORCE * (player.vy / JUMP_FORCE) - (GRAVITY * 0.5); // Counteract gravity more at the start of the jump
                 }
            }
             if (!keys.jump.pressed) {
                player.isJumping = false;
            }

        }

        function update(deltaTime) {
            handleInput();
            
            // --- Physics Update ---
            player.jumpHoldTime += deltaTime;

            // Apply friction
            player.vx *= FRICTION;

            // Apply gravity
            player.vy += GRAVITY;

            // Update position
            player.x += player.vx;
            player.y += player.vy;

            player.isGrounded = false;

            // --- Collision Detection (AABB) ---
            for (const platform of platforms) {
                if (
                    player.x < platform.x + platform.width &&
                    player.x + player.width > platform.x &&
                    player.y < platform.y + platform.height &&
                    player.y + player.height > platform.y
                ) {
                    // Collision occurred, resolve it
                    const prev_y = player.y - player.vy;
                    // Check if player was above the platform in the previous frame
                    if (prev_y + player.height <= platform.y) {
                        player.y = platform.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                        player.isJumping = false;
                    }
                }
            }

            // Keep player within screen bounds (for this prototype)
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > GAME_WIDTH) player.x = GAME_WIDTH - player.width;
        }

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw platforms
            ctx.fillStyle = platformColor;
            for (const platform of platforms) {
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
            }

            // Draw player
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Start the game loop
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
