<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGO TOEIC PRO</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --primary: #00ff88;
            --secondary: #00ccff;
            --text: #e0e0e0;
            --text-dim: #888;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            margin: 0;
            height: 100vh;
            display: grid;
            grid-template-rows: 60px 1fr;
            overflow: hidden;
        }

        header {
            background: rgba(20, 20, 20, 0.9);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
            color: white;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary);
        }

        nav {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-btn:hover {
            color: white;
            background: #333;
        }

        .nav-btn.active {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Content Area */
        main {
            overflow-y: auto;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        /* Vocab Grid */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .word-card {
            background: var(--surface);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--secondary);
        }

        .word-card h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .word-level {
            font-size: 10px;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #aaa;
        }

        .word-meaning {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .word-ex {
            font-size: 12px;
            color: #aaa;
            font-style: italic;
        }

        /* Strategy Section */
        .strategy-section {
            margin-bottom: 30px;
        }

        .part-header {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            color: white;
        }

        .strategy-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .strategy-list li {
            margin-bottom: 8px;
            color: #ccc;
        }

        .pattern-tag {
            display: inline-block;
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 5px;
            color: var(--secondary);
            border: 1px solid #444;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">EGO<span>TOEIC</span></div>
        <nav>
            <button class="nav-btn active" onclick="showTab('vocab')">Vocabulary</button>
            <button class="nav-btn" onclick="showTab('strategy')">Strategies</button>
        </nav>
    </header>

    <main id="app-content">
        <!-- Content injected by JS -->
    </main>

    <script>
        // --- RESCUED DATA FROM LEGACY ---
        const VOCAB_DB = {
            "600": [
                { "word": "agenda", "meaning": "議題、予定表", "example": "The agenda for today's meeting includes budget review." },
                { "word": "budget", "meaning": "予算", "example": "We need to stay within budget." },
                { "word": "deadline", "meaning": "締め切り", "example": "The deadline for submission is Friday." },
                { "word": "estimate", "meaning": "見積もり", "example": "Can you provide an estimate?" }
            ],
            "730": [
                { "word": "accommodate", "meaning": "収容する", "example": "The hotel can accommodate 200 guests." },
                { "word": "fluctuate", "meaning": "変動する", "example": "Prices fluctuate based on demand." },
                { "word": "mandatory", "meaning": "必須の", "example": "Attendance is mandatory." }
            ],
            "860": [
                { "word": "accrue", "meaning": "累積する", "example": "Interest will accrue monthly." },
                { "word": "augment", "meaning": "増加させる", "example": "We need to augment our workforce." },
                { "word": "meticulous", "meaning": "細心の", "example": "He is meticulous in his work." }
            ],
            "990": [
                { "word": "abate", "meaning": "弱まる", "example": "The storm showed no signs of abating." },
                { "word": "obviate", "meaning": "未然に防ぐ", "example": "The new system obviates the need for check." },
                { "word": "quintessential", "meaning": "典型的な", "example": "He is the quintessential professional." }
            ]
        };

        const STRATEGY_DB = {
            "P1": {
                "trends": "状態描写と動作描写のひっかけが巧妙化。",
                "strategies": ["人がいない写真でのbeingは不正解", "難解動詞(drape/stack)をマーク"],
                "patterns": ["状態vs動作", "無人写真の受動進行形"]
            },
            "P2": {
                "trends": "「そらし」の回答（間接応答）が3割。",
                "strategies": ["疑問詞を聞き逃さない", "Same Sound Trapに注意"],
                "patterns": ["間接応答", "逆質問"]
            },
            "P5": {
                "trends": "文脈判断が必要な語彙問題が増加。",
                "strategies": ["句か節かを見極める", "複合名詞の知識"],
                "patterns": ["前置詞vs接続詞", "コロケーション"]
            }
        };

        // --- APP LOGIC ---
        function showTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render(tab);
        }

        function render(mode) {
            const main = document.getElementById('app-content');
            main.innerHTML = '';

            if (mode === 'vocab') {
                const grid = document.createElement('div');
                grid.className = 'vocab-grid';

                // Merge all levels
                Object.keys(VOCAB_DB).forEach(level => {
                    VOCAB_DB[level].forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'word-card';
                        card.innerHTML = `
                            <h3>${item.word} <span class="word-level">L${level}</span></h3>
                            <div class="word-meaning">${item.meaning}</div>
                            <div class="word-ex">${item.example}</div>
                        `;
                        grid.appendChild(card);
                    });
                });
                main.appendChild(grid);
            }
            else if (mode === 'strategy') {
                Object.keys(STRATEGY_DB).forEach(part => {
                    const data = STRATEGY_DB[part];
                    const section = document.createElement('div');
                    section.className = 'strategy-section';
                    section.innerHTML = `
                        <div class="part-header">Part ${part.replace('P', '')}</div>
                        <div class="strategy-card">
                            <h4 style="color:var(--primary); margin-top:0;">🛑 Trends</h4>
                            <p style="font-size:14px; color:#ddd;">${data.trends}</p>
                            
                            <h4 style="color:var(--secondary);">💡 Strategic Action</h4>
                            <ul class="strategy-list">
                                ${data.strategies.map(s => `<li>${s}</li>`).join('')}
                            </ul>

                            <div style="margin-top:10px;">
                                ${data.patterns.map(p => `<span class="pattern-tag">${p}</span>`).join('')}
                            </div>
                        </div>
                    `;
                    main.appendChild(section);
                });
            }
        }

        // Init
        render('vocab');

    </script>
</body>

</html>
