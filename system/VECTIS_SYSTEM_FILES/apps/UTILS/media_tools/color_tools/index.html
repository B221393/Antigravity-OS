<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Color Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 30px;
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h3 {
            margin-bottom: 15px;
        }

        .color-preview {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #ff6b6b;
        }

        .color-input {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-bottom: 10px;
            font-family: 'Consolas', monospace;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .color-values {
            margin-top: 15px;
            font-size: 0.9em;
            line-height: 2;
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .palette-color {
            height: 50px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .palette-color:hover {
            transform: scale(1.1);
        }

        .gradient-preview {
            width: 100%;
            height: 80px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .contrast-box {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 10px;
        }

        .copy-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #27ae60;
            padding: 10px 25px;
            border-radius: 25px;
            display: none;
        }
    </style>
</head>

<body>
    <h1>🎨 VECTIS Color Tools</h1>

    <div class="container">
        <!-- Color Picker -->
        <div class="card">
            <h3>🎯 カラーピッカー</h3>
            <div class="color-preview" id="colorPreview"></div>
            <input type="color" class="color-input" id="colorPicker" value="#ff6b6b" oninput="updateColor()">
            <div class="color-values" id="colorValues">
                <strong>HEX:</strong> #ff6b6b<br>
                <strong>RGB:</strong> rgb(255, 107, 107)<br>
                <strong>HSL:</strong> hsl(0, 100%, 71%)
            </div>
            <div style="margin-top:15px">
                <button class="btn" onclick="copyColor('hex')">HEX</button>
                <button class="btn" onclick="copyColor('rgb')">RGB</button>
                <button class="btn" onclick="copyColor('hsl')">HSL</button>
            </div>
        </div>

        <!-- Random Palette -->
        <div class="card">
            <h3>🎲 ランダムパレット</h3>
            <div class="palette" id="palette"></div>
            <button class="btn" onclick="generatePalette()" style="margin-top:15px;width:100%">新しいパレット生成</button>
        </div>

        <!-- Gradient Generator -->
        <div class="card">
            <h3>🌈 グラデーション</h3>
            <div class="gradient-preview" id="gradientPreview"
                style="background:linear-gradient(135deg, #ff6b6b, #48dbfb)"></div>
            <div style="display:flex;gap:10px;margin-bottom:10px">
                <input type="color" class="color-input" id="gradColor1" value="#ff6b6b" oninput="updateGradient()"
                    style="height:40px">
                <input type="color" class="color-input" id="gradColor2" value="#48dbfb" oninput="updateGradient()"
                    style="height:40px">
            </div>
            <select class="input" id="gradDirection" onchange="updateGradient()">
                <option value="90deg">→ 右へ</option>
                <option value="135deg" selected>↘ 斜め</option>
                <option value="180deg">↓ 下へ</option>
                <option value="45deg">↗ 斜め上</option>
            </select>
            <input type="text" class="input" id="gradientCSS" readonly
                value="linear-gradient(135deg, #ff6b6b, #48dbfb)">
            <button class="btn" onclick="copyGradient()" style="width:100%">CSSをコピー</button>
        </div>

        <!-- Contrast Checker -->
        <div class="card">
            <h3>⚖️ コントラストチェック</h3>
            <div class="contrast-box" id="contrastBox" style="background:#1a1a2e;color:#fff">
                サンプルテキスト
            </div>
            <div style="display:flex;gap:10px;margin-bottom:10px">
                <input type="color" class="color-input" id="bgColor" value="#1a1a2e" oninput="updateContrast()"
                    style="height:40px">
                <input type="color" class="color-input" id="fgColor" value="#ffffff" oninput="updateContrast()"
                    style="height:40px">
            </div>
            <div id="contrastResult">コントラスト比: <strong>16.10:1</strong> ✅ WCAG AAA</div>
        </div>

        <!-- Color Converter -->
        <div class="card">
            <h3>🔄 カラー変換</h3>
            <input type="text" class="input" id="convertInput" placeholder="#ff6b6b または rgb(255,107,107)"
                value="#ff6b6b">
            <button class="btn" onclick="convertColor()" style="width:100%;margin-bottom:15px">変換</button>
            <div id="convertResult" class="color-values">
                結果がここに表示されます
            </div>
        </div>

        <!-- Shades Generator -->
        <div class="card">
            <h3>🌗 シェード生成</h3>
            <input type="color" class="color-input" id="shadeColor" value="#3498db" oninput="generateShades()"
                style="height:40px;margin-bottom:10px">
            <div class="palette" id="shadesGrid"></div>
        </div>
    </div>

    <div class="copy-toast" id="toast">コピーしました！</div>

    <script>
        let currentColor = { hex: '#ff6b6b', rgb: 'rgb(255, 107, 107)', hsl: 'hsl(0, 100%, 71%)' };

        function updateColor() {
            const hex = document.getElementById('colorPicker').value;
            const rgb = hexToRgb(hex);
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

            currentColor = {
                hex: hex,
                rgb: `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`,
                hsl: `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`
            };

            document.getElementById('colorPreview').style.background = hex;
            document.getElementById('colorValues').innerHTML = `
                <strong>HEX:</strong> ${currentColor.hex}<br>
                <strong>RGB:</strong> ${currentColor.rgb}<br>
                <strong>HSL:</strong> ${currentColor.hsl}
            `;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function copyColor(type) {
            navigator.clipboard.writeText(currentColor[type]);
            showToast();
        }

        function generatePalette() {
            const palette = document.getElementById('palette');
            palette.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const color = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
                const div = document.createElement('div');
                div.className = 'palette-color';
                div.style.background = color;
                div.title = color;
                div.onclick = () => { navigator.clipboard.writeText(color); showToast(); };
                palette.appendChild(div);
            }
        }

        function updateGradient() {
            const c1 = document.getElementById('gradColor1').value;
            const c2 = document.getElementById('gradColor2').value;
            const dir = document.getElementById('gradDirection').value;
            const css = `linear-gradient(${dir}, ${c1}, ${c2})`;
            document.getElementById('gradientPreview').style.background = css;
            document.getElementById('gradientCSS').value = css;
        }

        function copyGradient() {
            navigator.clipboard.writeText(document.getElementById('gradientCSS').value);
            showToast();
        }

        function getLuminance(r, g, b) {
            const a = [r, g, b].map(v => {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function updateContrast() {
            const bg = hexToRgb(document.getElementById('bgColor').value);
            const fg = hexToRgb(document.getElementById('fgColor').value);
            const l1 = getLuminance(bg.r, bg.g, bg.b);
            const l2 = getLuminance(fg.r, fg.g, fg.b);
            const ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);

            const box = document.getElementById('contrastBox');
            box.style.background = document.getElementById('bgColor').value;
            box.style.color = document.getElementById('fgColor').value;

            let level = '❌ 不合格';
            if (ratio >= 7) level = '✅ WCAG AAA';
            else if (ratio >= 4.5) level = '✅ WCAG AA';
            else if (ratio >= 3) level = '⚠️ 大きい文字のみ';

            document.getElementById('contrastResult').innerHTML = `コントラスト比: <strong>${ratio.toFixed(2)}:1</strong> ${level}`;
        }

        function convertColor() {
            const input = document.getElementById('convertInput').value.trim();
            let rgb, hex, hsl;

            if (input.startsWith('#')) {
                rgb = hexToRgb(input);
                hex = input;
            } else if (input.startsWith('rgb')) {
                const match = input.match(/\d+/g);
                rgb = { r: parseInt(match[0]), g: parseInt(match[1]), b: parseInt(match[2]) };
                hex = '#' + [rgb.r, rgb.g, rgb.b].map(x => x.toString(16).padStart(2, '0')).join('');
            }

            if (rgb) {
                hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
                document.getElementById('convertResult').innerHTML = `
                    <strong>HEX:</strong> ${hex}<br>
                    <strong>RGB:</strong> rgb(${rgb.r}, ${rgb.g}, ${rgb.b})<br>
                    <strong>HSL:</strong> hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)
                `;
            }
        }

        function generateShades() {
            const hex = document.getElementById('shadeColor').value;
            const rgb = hexToRgb(hex);
            const grid = document.getElementById('shadesGrid');
            grid.innerHTML = '';

            for (let i = -2; i <= 2; i++) {
                const factor = 1 + i * 0.2;
                const r = Math.min(255, Math.max(0, Math.round(rgb.r * factor)));
                const g = Math.min(255, Math.max(0, Math.round(rgb.g * factor)));
                const b = Math.min(255, Math.max(0, Math.round(rgb.b * factor)));
                const color = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');

                const div = document.createElement('div');
                div.className = 'palette-color';
                div.style.background = color;
                div.title = color;
                div.onclick = () => { navigator.clipboard.writeText(color); showToast(); };
                grid.appendChild(div);
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 1500);
        }

        // Init
        generatePalette();
        generateShades();
    </script>
</body>

</html>
