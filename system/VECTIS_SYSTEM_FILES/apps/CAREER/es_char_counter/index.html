<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES Analyzer - VECTIS OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050608;
            --surface-color: rgba(20, 22, 28, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.3);
            --secondary: #7c3aed;
            --secondary-glow: rgba(124, 58, 237, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #4b5563;

            /* Status colors */
            --status-under: #fbbf24;
            --status-good: #34d399;
            --status-over: #ef4444;

            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 80% 20%, var(--secondary-glow) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, var(--primary-glow) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--surface-border);
            background: rgba(5, 6, 8, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Main Container */
        .container {
            display: flex;
            flex: 1;
            padding: 2rem;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Sidebar Tabs */
        .sidebar {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tab-btn {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(40, 44, 52, 0.8);
        }

        .tab-btn.active {
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow), inset 0 0 10px rgba(0, 212, 255, 0.1);
            background: rgba(0, 212, 255, 0.05);
        }

        .tab-btn .tab-count {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        .add-tab-btn {
            background: transparent;
            border: 1px dashed var(--surface-border);
            color: var(--text-secondary);
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .add-tab-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 212, 255, 0.05);
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .settings-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .input-number {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--surface-border);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            width: 80px;
            font-family: var(--font-mono);
            font-size: 1rem;
            text-align: center;
            transition: border-color 0.3s;
        }

        .input-number:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Editor Area */
        .editor-container {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
            backdrop-filter: blur(10px);
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .editor-container.status-under {
            border-color: rgba(251, 191, 36, 0.4);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.1);
        }

        .editor-container.status-good {
            border-color: rgba(52, 211, 153, 0.4);
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.1);
        }

        .editor-container.status-over {
            border-color: rgba(239, 68, 68, 0.4);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
        }

        .editor-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .editor-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-rename {
            background: transparent;
            border: 1px dashed transparent;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .btn-rename:hover,
        .btn-rename:focus {
            border-color: var(--primary);
            outline: none;
        }

        .counter-hud {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .count-current {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: var(--font-mono);
            line-height: 1;
            transition: color 0.3s;
        }

        .status-under .count-current {
            color: var(--status-under);
        }

        .status-good .count-current {
            color: var(--status-good);
        }

        .status-over .count-current {
            color: var(--status-over);
        }

        .count-limit {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-family: var(--font-mono);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.8;
            resize: none;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            width: 100%;
            height: 100%;
        }

        textarea:focus {
            outline: none;
        }

        ::placeholder {
            color: var(--text-muted);
        }

        /* Progress Bar */
        .progress-wrapper {
            height: 6px;
            background: rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease-out, background 0.3s;
        }

        .status-under .progress-bar {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        .status-good .progress-bar {
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        .status-over .progress-bar {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }

        .status-footer {
            padding: 0.8rem 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        .status-message {
            transition: color 0.3s;
        }

        .status-under .status-message {
            color: var(--status-under);
        }

        .status-good .status-message {
            color: var(--status-good);
        }

        .status-over .status-message {
            color: var(--status-over);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-microchip"></i>
            VECTIS / ES_ANALYZER
        </div>
        <div class="header-actions">
            <button onclick="copyToClipboard()" id="copyBtn">
                <i class="fa-regular fa-copy"></i> Copy Content
            </button>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar Navigation -->
        <div class="sidebar" id="tabList">
            <!-- Tabs injected by JS -->
        </div>

        <!-- Main Editor -->
        <div class="workspace">
            <div class="toolbar">
                <div class="settings-group">
                    <div class="setting-item">
                        <label><i class="fa-solid fa-arrow-down-short-wide"></i> MIN:</label>
                        <input type="number" id="minChars" class="input-number" value="390" onchange="updateAnalysis()">
                    </div>
                    <div class="setting-item">
                        <label><i class="fa-solid fa-arrow-up-wide-short"></i> MAX:</label>
                        <input type="number" id="maxChars" class="input-number" value="400" onchange="updateAnalysis()">
                    </div>
                </div>

                <div style="font-size: 0.8rem; color: var(--text-secondary); display:flex; gap:15px;">
                    <span style="color:var(--status-under)"><i class="fa-solid fa-circle"></i> Under</span>
                    <span style="color:var(--status-good)"><i class="fa-solid fa-circle"></i> Optimal</span>
                    <span style="color:var(--status-over)"><i class="fa-solid fa-circle"></i> Over</span>
                </div>
            </div>

            <div class="editor-container status-under" id="editorWrapper">
                <div class="editor-header">
                    <div class="editor-title">
                        <i class="fa-solid fa-pen-nib"></i>
                        <input type="text" id="entryTitle" class="btn-rename" value="設問 1" onchange="updateTabName()">
                    </div>
                    <div class="counter-hud">
                        <span class="count-current" id="charCount">0</span>
                        <span class="count-limit">/ <span id="limitDisplay">400</span></span>
                    </div>
                </div>

                <textarea id="editor"
                    placeholder="Start typing your entry sheet response here... Data is automatically saved locally."
                    oninput="updateAnalysis()"></textarea>

                <div class="progress-wrapper">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="status-footer">
                    <span class="status-message" id="statusMessage">Awaiting input...</span>
                    <!-- You can add advanced metrics like sentence count here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'vectis_es_analyzer_data';
        let entries = [];
        let activeId = null;

        function init() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                entries = JSON.parse(stored);
            }
            if (entries.length === 0) {
                // Backward compatibility or default
                entries = [
                    { id: 1, title: '設問 1', text: '', min: 390, max: 400 },
                    { id: 2, title: '設問 2', text: '', min: 390, max: 400 }
                ];
            }

            renderTabs();
            switchTab(entries[0].id);
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
            renderTabs(); // Refresh word counts on tabs
        }

        function createNewTab() {
            const newId = Date.now();
            const lastMax = document.getElementById('maxChars').value || 400;
            const lastMin = document.getElementById('minChars').value || 390;

            entries.push({
                id: newId,
                title: `新しい設問`,
                text: '',
                min: lastMin,
                max: lastMax
            });

            saveToStorage();
            switchTab(newId);
        }

        function renderTabs() {
            const tabList = document.getElementById('tabList');
            tabList.innerHTML = '';

            entries.forEach(entry => {
                const isUnder = entry.text.length < entry.min;
                const isOver = entry.text.length > entry.max;
                const isGood = !isUnder && !isOver;

                let color = '#fbbf24'; // under
                if (isGood) color = '#34d399';
                if (isOver) color = '#ef4444';
                if (entry.text.length === 0) color = '#9ca3af';

                const btn = document.createElement('button');
                btn.className = `tab-btn ${entry.id === activeId ? 'active' : ''}`;
                btn.onclick = () => switchTab(entry.id);
                btn.innerHTML = `
                    <span style="display:flex; align-items:center; gap:8px;">
                        <i class="fa-solid fa-circle" style="font-size:8px; color:${color}"></i>
                        ${escapeHtml(entry.title)}
                    </span>
                    <span class="tab-count">${entry.text.length}</span>
                `;
                tabList.appendChild(btn);
            });

            // Add button
            const addBtn = document.createElement('button');
            addBtn.className = 'add-tab-btn';
            addBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Add Entry';
            addBtn.onclick = createNewTab;
            tabList.appendChild(addBtn);
        }

        function switchTab(id) {
            // Save current state first
            if (activeId !== null) {
                const currentEntry = entries.find(e => e.id === activeId);
                if (currentEntry) {
                    currentEntry.text = document.getElementById('editor').value;
                    currentEntry.min = document.getElementById('minChars').value;
                    currentEntry.max = document.getElementById('maxChars').value;
                    currentEntry.title = document.getElementById('entryTitle').value;
                }
            }

            activeId = id;
            const target = entries.find(e => e.id === id);

            if (target) {
                document.getElementById('editor').value = target.text;
                document.getElementById('minChars').value = target.min;
                document.getElementById('maxChars').value = target.max;
                document.getElementById('entryTitle').value = target.title;
                document.getElementById('limitDisplay').innerText = target.max;

                updateAnalysis(false); // Update HUD without saving repeatedly
            }
            renderTabs();
        }

        function updateTabName() {
            const title = document.getElementById('entryTitle').value;
            const entry = entries.find(e => e.id === activeId);
            if (entry) {
                entry.title = title;
                saveToStorage();
            }
        }

        function updateAnalysis(save = true) {
            const text = document.getElementById('editor').value;
            const min = parseInt(document.getElementById('minChars').value) || 0;
            const max = parseInt(document.getElementById('maxChars').value) || 1;
            const count = text.length;

            document.getElementById('limitDisplay').innerText = max;
            document.getElementById('charCount').innerText = count;

            const wrapper = document.getElementById('editorWrapper');
            const progress = document.getElementById('progressBar');
            const msg = document.getElementById('statusMessage');

            // Reset classes
            wrapper.className = 'editor-container';

            let percent = (count / max) * 100;
            if (percent > 100) percent = 100;
            progress.style.width = `${percent}%`;

            if (count === 0) {
                wrapper.classList.add('status-under');
                msg.innerText = `Awaiting input... Needs ${min} characters minimum.`;
            } else if (count < min) {
                wrapper.classList.add('status-under');
                msg.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Only ${count} chars. ${min - count} more needed for minimum.`;
            } else if (count <= max) {
                wrapper.classList.add('status-good');
                msg.innerHTML = `<i class="fa-solid fa-circle-check"></i> Optimal Length. ${max - count} chars remaining.`;
            } else {
                wrapper.classList.add('status-over');
                msg.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> Too long! You are over the limit by ${count - max} chars.`;
            }

            if (save) {
                const currentEntry = entries.find(e => e.id === activeId);
                if (currentEntry) {
                    currentEntry.text = text;
                    currentEntry.min = min;
                    currentEntry.max = max;
                    saveToStorage();
                }
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('editor').value;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                btn.style.color = 'var(--status-good)';
                btn.style.borderColor = 'var(--status-good)';
                setTimeout(() => {
                    btn.innerHTML = orig;
                    btn.style.color = '';
                    btn.style.borderColor = '';
                }, 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Boot
        init();
    </script>
</body>

</html>
