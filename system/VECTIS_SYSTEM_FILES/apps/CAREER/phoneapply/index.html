<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VECTIS MOBILE</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #050505;
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .tab-active {
            color: #00FFCC;
            border-top: 2px solid #00FFCC;
        }

        .tab-inactive {
            color: #666;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        input,
        textarea {
            background: #111;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
        }

        input:focus,
        textarea:focus {
            border-color: #00FFCC;
            outline: none;
        }

        /* Pulse Animation for Recording */
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(255, 68, 68, 0);
            }

            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0);
            }
        }

        .recording-pulse {
            animation: pulse-ring 2s infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');

            return (
                <div className="h-screen flex flex-col safe-area-bottom">
                    {/* Header */}
                    <header className="p-4 border-b border-gray-800 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-10">
                        <h1 className="text-xl font-bold tracking-widest text-[#00FFCC]">VECTIS</h1>
                        <div className="text-xs text-gray-500">MOBILE LINKED</div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 overflow-y-auto p-4 pb-20">
                        {activeTab === 'dashboard' && <DashboardView />}
                        {activeTab === 'chat' && <ChatView />}
                        {activeTab === 'diary' && <DiaryView />}
                        {activeTab === 'voice' && <VoiceRecorderView />}
                        {activeTab === 'guide' && <GuideView />}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full bg-[#0A0A0A] border-t border-gray-800 flex justify-around items-center safe-area-bottom z-20">
                        <NavButton icon="fa-layer-group" label="DASH" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                        <NavButton icon="fa-comments" label="CHAT" active={activeTab === 'chat'} onClick={() => setActiveTab('chat')} />
                        <NavButton icon="fa-microphone" label="VOICE" active={activeTab === 'voice'} onClick={() => setActiveTab('voice')} />
                        <NavButton icon="fa-book" label="LOG" active={activeTab === 'diary'} onClick={() => setActiveTab('diary')} />
                        <NavButton icon="fa-circle-info" label="GUIDE" active={activeTab === 'guide'} onClick={() => setActiveTab('guide')} />
                    </nav>
                </div>
            );
        }

        function NavButton({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center justify-center w-full py-3 ${active ? 'text-[#00FFCC]' : 'text-gray-600'}`}>
                    <i className={`fa-solid ${icon} text-xl mb-1`}></i>
                    <span className="text-[10px] font-bold tracking-wider">{label}</span>
                </button>
            );
        }

        // --- VIEWS ---

        function GuideView() {
            const [note, setNote] = useState(localStorage.getItem('vectis_guide_note') || "");

            const saveNote = (txt) => {
                setNote(txt);
                localStorage.setItem('vectis_guide_note', txt);
            };

            return (
                <div className="space-y-6">
                    <div className="bg-[#111] p-5 rounded-2xl border border-gray-800">
                        <h2 className="text-sm text-[#00FFCC] font-bold mb-4"><i className="fa-solid fa-rocket mr-2"></i> USER MANUAL</h2>

                        <div className="space-y-4 text-xs text-gray-300">
                            <div>
                                <h3 className="text-white font-bold mb-1">1. VOICE INPUT (無制限)</h3>
                                <p>「VOICE」タブのマイクボタンを1回タップで開始、もう1回で停止。時間は無制限です。バックグラウンド再生はできません。</p>
                            </div>
                            <div>
                                <h3 className="text-white font-bold mb-1">2. CHAT WITH AI</h3>
                                <p>「CHAT」タブで話しかけると、その会話はすべて <code>gemini_logs.json</code> に自動保存されます。</p>
                            </div>
                            <div>
                                <h3 className="text-white font-bold mb-1">3. SYNC</h3>
                                <p>DASHタブの「SYNC」ボタンで、PC側の最新データを再取得します。</p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-[#111] p-5 rounded-2xl border border-gray-800">
                        <h2 className="text-sm text-yellow-500 font-bold mb-2"><i className="fa-regular fa-pen-to-square mr-2"></i> PERSONAL MEMO</h2>
                        <p className="text-[10px] text-gray-500 mb-2">使い方や気付きをここにメモできます（ブラウザ保存）</p>
                        <textarea
                            className="w-full h-32 bg-[#050505] p-3 text-sm text-white rounded-xl focus:border-yellow-500"
                            value={note}
                            onChange={(e) => saveNote(e.target.value)}
                            placeholder="Type functionality notes here..."
                        ></textarea>
                    </div>
                </div>
            );
        }

        function ChatView() {
            const [messages, setMessages] = useState([
                { id: 0, role: 'ai', text: 'VECTIS CHAT SYSTEM ONLINE. How can I assist you?' }
            ]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            const send = async () => {
                if (!input.trim()) return;
                const userMsg = { id: Date.now(), role: 'user', text: input };
                setMessages(prev => [...prev, userMsg]);
                setInput("");
                setLoading(true);

                try {
                    const formData = new URLSearchParams();
                    formData.append('message', userMsg.text);

                    const res = await fetch('/chat', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();

                    if (data.status === 'success') {
                        setMessages(prev => [...prev, { id: Date.now() + 1, role: 'ai', text: data.reply }]);
                    } else {
                        setMessages(prev => [...prev, { id: Date.now() + 1, role: 'system', text: 'Error: ' + data.message }]);
                    }
                } catch (e) {
                    setMessages(prev => [...prev, { id: Date.now() + 1, role: 'system', text: 'Connection Error' }]);
                }
                setLoading(false);
            };

            return (
                <div className="flex flex-col h-full">
                    <div className="flex-1 overflow-y-auto space-y-4 mb-4" ref={scrollRef}>
                        {messages.map(m => (
                            <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${m.role === 'user' ? 'bg-[#00FFCC]/20 text-[#00FFCC] rounded-tr-none' :
                                    m.role === 'ai' ? 'bg-[#111] border border-gray-800 text-gray-300 rounded-tl-none' : 'bg-red-900/20 text-red-400'
                                    }`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        {loading && <div className="text-xs text-gray-500 animate-pulse ml-2">Processing...</div>}
                    </div>
                    <div className="flex gap-2">
                        <input
                            className="flex-1 p-3 bg-[#111] border border-gray-800 rounded-xl text-white focus:border-[#00FFCC] outline-none"
                            value={input}
                            onChange={e => setInput(e.target.value)}
                            placeholder="Type message..."
                            onKeyPress={e => e.key === 'Enter' && send()}
                        />
                        <button onClick={send} disabled={loading} className="bg-[#00FFCC] text-black px-4 rounded-xl font-bold hover:opacity-80 disabled:opacity-50">
                            <i className="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            );
        }

        function DashboardView() {
            // Mock Data Integration (In real PWA, fetch from /api/dashboard)
            return (
                <div className="space-y-4">
                    <div className="bg-[#111] p-5 rounded-2xl border border-gray-800">
                        <h2 className="text-xs text-[#00FFCC] font-bold mb-2">STATUS</h2>
                        <div className="flex justify-between items-end">
                            <span className="text-2xl font-bold text-white">Online</span>
                            <span className="text-xs text-gray-500">System Normal</span>
                        </div>
                    </div>

                    <div className="bg-[#111] p-5 rounded-2xl border border-gray-800">
                        <h2 className="text-xs text-yellow-500 font-bold mb-2">TODAY'S MISSION</h2>
                        <ul className="space-y-3 text-sm text-gray-300">
                            <li className="flex items-center"><i className="fa-regular fa-square-check mr-2 text-green-500"></i> Research Physical AI</li>
                            <li className="flex items-center"><i className="fa-regular fa-square mr-2 text-gray-500"></i> Update Neural Log</li>
                        </ul>
                    </div>

                    <button className="w-full bg-[#00FFCC]/10 border border-[#00FFCC] text-[#00FFCC] py-3 rounded-xl font-bold text-sm hover:bg-[#00FFCC]/20 transition">
                        SYNC PC DATA
                    </button>
                </div>
            );
        }

        function DiaryView() {
            const [entries, setEntries] = useState([
                { id: 1, title: "Initial Mobile Sync", content: "Mobile interface established via phoneapply module.", time: "12:00", clarity: 80 }
            ]);

            return (
                <div className="space-y-4">
                    <h2 className="text-xs text-gray-500 font-bold mb-2">MEMORY STREAM</h2>
                    {entries.map(e => (
                        <div key={e.id} className="bg-[#111] p-4 rounded-xl border-l-2 border-[#00FFCC] border-b border-r border-t border-gray-800">
                            <div className="flex justify-between mb-2">
                                <span className="text-xs text-gray-400 font-mono">{e.time}</span>
                                <span className="text-xs text-[#00FFCC] border border-[#00FFCC]/30 px-2 rounded">CL: {e.clarity}%</span>
                            </div>
                            <h3 className="font-bold text-white mb-1">{e.title}</h3>
                            <p className="text-sm text-gray-400 line-clamp-3">{e.content}</p>
                        </div>
                    ))}
                    <div className="text-center text-xs text-gray-600 mt-8">Synced with apps/diary/data</div>
                </div>
            );
        }

        function VoiceRecorderView() {
            const [recording, setRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const mediaRecorderRef = useRef(null);
            const chunksRef = useRef([]);

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorderRef.current = new MediaRecorder(stream);
                    chunksRef.current = [];

                    mediaRecorderRef.current.ondataavailable = (e) => {
                        if (e.data.size > 0) chunksRef.current.push(e.data);
                    };

                    mediaRecorderRef.current.onstop = async () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        // Here you would upload blob to backend for Whisper transcription
                        // For demo/UI mock:
                        setTimeout(() => {
                            setTranscript(prev => prev + "\n[Audio Processed] Mobile voice input captured.");
                        }, 1000);
                    };

                    mediaRecorderRef.current.start();
                    setRecording(true);
                } catch (err) {
                    alert("Microphone access denied or error: " + err);
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && recording) {
                    mediaRecorderRef.current.stop();
                    setRecording(false);
                    // Stop all tracks
                    mediaRecorderRef.current.stream.getTracks().forEach(track => track.stop());
                }
            };

            return (
                <div className="flex flex-col items-center justify-center h-full space-y-8">
                    <div className="relative">
                        <button
                            onClick={recording ? stopRecording : startRecording}
                            className={`w-32 h-32 rounded-full flex items-center justify-center transition-all duration-300 ${recording ? 'bg-red-500 shadow-[0_0_30px_rgba(255,0,0,0.5)]' : 'bg-[#111] border-2 border-[#00FFCC]'}`}
                        >
                            <i className={`fa-solid ${recording ? 'fa-stop fa-2x text-white' : 'fa-microphone fa-3x text-[#00FFCC]'}`}></i>
                        </button>
                        {recording && <div className="absolute inset-0 rounded-full border-4 border-red-500/30 recording-pulse pointer-events-none"></div>}
                    </div>

                    <div className="text-center">
                        <h2 className="text-xl font-bold text-white mb-2">{recording ? "RECORDING..." : "TAP TO RECORD"}</h2>
                        <p className="text-xs text-gray-500 max-w-[200px] mx-auto">
                            {recording ? "Unlimited duration. Tap stop when done." : "High-fidelity audio capture backed by Groq Whisper."}
                        </p>
                    </div>

                    {transcript && (
                        <div className="w-full bg-[#111] p-4 rounded-xl border border-gray-800 mt-4">
                            <h3 className="text-xs text-gray-500 font-bold mb-2">TRANSCRIPT PREVIEW</h3>
                            <p className="text-sm text-gray-300 whitespace-pre-wrap">{transcript}</p>
                            <button className="mt-3 w-full border border-gray-700 text-gray-400 text-xs py-2 rounded hover:bg-white/5">
                                SAVE TO LOG
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
