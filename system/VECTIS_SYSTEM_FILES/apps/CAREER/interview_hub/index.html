<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EGO Interview Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #08080d;
            --s1: #0e0e18;
            --s2: #151525;
            --s3: #1c1c30;
            --bd: #252545;
            --ac: #7c6cf0;
            --ac2: #a89eff;
            --ac3: #00d4c8;
            --ac4: #ff6b9d;
            --tx: #e8e8f0;
            --tx2: #7878a0;
            --tx3: #50506a;
            --ok: #2ecc71;
            --warn: #f39c12;
            --err: #e74c3c
        }

        body {
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            color: var(--tx);
            height: 100vh;
            overflow: hidden
        }

        .app {
            display: flex;
            height: 100vh
        }

        .sb {
            width: 240px;
            background: var(--s1);
            border-right: 1px solid var(--bd);
            display: flex;
            flex-direction: column;
            flex-shrink: 0
        }

        .sb-h {
            padding: 20px 16px;
            border-bottom: 1px solid var(--bd);
            display: flex;
            align-items: center;
            gap: 10px
        }

        .sb-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--ac), var(--ac3));
            display: flex;
            align-items: center;
            justify-content: center
        }

        .sb-logo svg {
            width: 18px;
            height: 18px;
            fill: #fff
        }

        .sb-h div h1 {
            font-size: 13px;
            color: var(--ac2);
            letter-spacing: 1.5px;
            font-weight: 600
        }

        .sb-h div p {
            font-size: 10px;
            color: var(--tx2)
        }

        .nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px
        }

        .ni {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: var(--tx2);
            transition: all .15s;
            margin-bottom: 1px;
            border: 1px solid transparent
        }

        .ni:hover {
            background: var(--s2);
            color: var(--tx)
        }

        .ni.on {
            background: linear-gradient(135deg, rgba(124, 108, 240, .12), rgba(0, 212, 200, .06));
            color: var(--ac2);
            border-color: rgba(124, 108, 240, .25)
        }

        .ni svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
            opacity: .7
        }

        .ni.on svg {
            opacity: 1;
            fill: var(--ac2)
        }

        .mn {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .tb {
            padding: 12px 20px;
            border-bottom: 1px solid var(--bd);
            background: rgba(14, 14, 24, .8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .sb-x {
            position: relative;
            flex: 1
        }

        .sb-x input {
            width: 100%;
            padding: 9px 14px 9px 36px;
            background: var(--s2);
            border: 1px solid var(--bd);
            border-radius: 8px;
            color: var(--tx);
            font-size: 12px;
            outline: none;
            transition: all .2s
        }

        .sb-x input:focus {
            border-color: var(--ac);
            box-shadow: 0 0 0 3px rgba(124, 108, 240, .1)
        }

        .sb-x svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            fill: var(--tx2)
        }

        .ct {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth
        }

        .sec {
            display: none
        }

        .sec.on {
            display: block;
            animation: fi .25s ease
        }

        @keyframes fi {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .cd {
            background: var(--s1);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all .2s
        }

        .cd:hover {
            border-color: rgba(124, 108, 240, .3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, .3)
        }

        .cd h3 {
            font-size: 13px;
            color: var(--ac2);
            margin-bottom: 6px;
            font-weight: 600
        }

        .cd p,
        .cd li {
            font-size: 12px;
            line-height: 1.7;
            color: var(--tx)
        }

        .bg {
            display: inline-flex;
            align-items: center;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .5px;
            margin-right: 3px
        }

        .bg-s {
            background: rgba(231, 76, 60, .15);
            color: var(--err)
        }

        .bg-a {
            background: rgba(243, 156, 18, .15);
            color: var(--warn)
        }

        .bg-b {
            background: rgba(46, 204, 113, .15);
            color: var(--ok)
        }

        .bg-r {
            background: rgba(124, 108, 240, .15);
            color: var(--ac2)
        }

        .bg-o {
            background: rgba(80, 80, 106, .2);
            color: var(--tx2)
        }

        .sg {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 16px
        }

        .sc {
            background: var(--s1);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            transition: all .3s
        }

        .sc:hover {
            border-color: var(--ac);
            transform: translateY(-2px)
        }

        .sc .n {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--ac), var(--ac3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .sc .l {
            font-size: 10px;
            color: var(--tx2);
            margin-top: 2px
        }

        .pb {
            height: 3px;
            background: var(--s3);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px
        }

        .pb .f {
            height: 100%;
            background: linear-gradient(90deg, var(--ac), var(--ac3));
            border-radius: 2px;
            transition: width .5s
        }

        .sa {
            background: var(--s2);
            border: 1px solid var(--bd);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 14px
        }

        .sq {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 14px
        }

        .sh {
            background: rgba(0, 212, 200, .06);
            border-left: 3px solid var(--ac3);
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 10px;
            font-size: 11px;
            color: var(--tx2);
            display: none
        }

        .san {
            background: rgba(124, 108, 240, .06);
            border-left: 3px solid var(--ac);
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 12px;
            line-height: 1.8;
            display: none
        }

        .btn {
            padding: 7px 14px;
            border-radius: 7px;
            border: 1px solid var(--bd);
            background: var(--s2);
            color: var(--tx);
            font-size: 11px;
            cursor: pointer;
            transition: all .15s;
            display: inline-flex;
            align-items: center;
            gap: 5px
        }

        .btn:hover {
            border-color: var(--ac);
            background: rgba(124, 108, 240, .1)
        }

        .btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor
        }

        .btn-p {
            background: linear-gradient(135deg, var(--ac), var(--ac2));
            border: none;
            color: #fff;
            font-weight: 600
        }

        .btn-p:hover {
            opacity: .9;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(124, 108, 240, .3)
        }

        .bg-f {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 10px
        }

        .tm {
            font-size: 22px;
            font-weight: 700;
            color: var(--ac3);
            font-variant-numeric: tabular-nums
        }

        .ct-tab {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            margin: 0 3px 6px 0;
            background: var(--s2);
            border: 1px solid var(--bd);
            color: var(--tx2);
            transition: all .15s
        }

        .ct-tab:hover {
            border-color: var(--ac)
        }

        .ct-tab.on {
            background: rgba(124, 108, 240, .15);
            border-color: var(--ac);
            color: var(--ac2)
        }

        .ct-tab svg {
            width: 10px;
            height: 10px;
            fill: currentColor
        }

        .dc {
            border-left: 2px solid var(--bd);
            padding-left: 14px;
            margin: 10px 0 0 6px
        }

        .dq {
            margin-bottom: 10px
        }

        .dq-q {
            font-size: 12px;
            font-weight: 600;
            color: var(--warn);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color .15s
        }

        .dq-q:hover {
            color: var(--ac2)
        }

        .dq-q svg {
            width: 10px;
            height: 10px;
            fill: currentColor;
            transition: transform .2s
        }

        .dq-a {
            font-size: 11px;
            color: var(--tx);
            line-height: 1.7;
            margin-top: 4px;
            display: none;
            padding: 8px 10px;
            background: rgba(124, 108, 240, .04);
            border-radius: 6px
        }

        .hl {
            background: rgba(243, 156, 18, .25);
            padding: 0 2px;
            border-radius: 2px
        }

        h2 {
            font-size: 17px;
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px
        }

        h2 svg {
            width: 20px;
            height: 20px;
            fill: var(--ac2)
        }

        .sub {
            font-size: 11px;
            color: var(--tx2);
            margin-bottom: 14px
        }

        ul {
            padding-left: 18px
        }

        li {
            margin-bottom: 3px;
            font-size: 12px
        }

        .co-hd {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px
        }

        .co-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="sb">
            <div class="sb-h">
                <div class="sb-logo"><svg viewBox="0 0 24 24">
                        <path d="M13 3L4 14h7l-2 7 9-11h-7l2-7z" />
                    </svg></div>
                <div>
                    <h1>INTERVIEW HQ</h1>
                    <p>EGO Command Center</p>
                </div>
            </div>
            <div class="nav" id="nav">
                <div class="ni on" data-s="dash"><svg viewBox="0 0 24 24">
                        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
                    </svg>ダッシュボード</div>
                <div class="ni" data-s="sim"><svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
                        <path d="M12 6v6l4 2" />
                    </svg>シミュレーター</div>
                <div class="ni" data-s="deep"><svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                    </svg>深掘り特訓</div>
                <div class="ni" data-s="scripts"><svg viewBox="0 0 24 24">
                        <path
                            d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                    </svg>回答スクリプト</div>
                <div class="ni" data-s="co"><svg viewBox="0 0 24 24">
                        <path
                            d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z" />
                    </svg>企業別対策</div>
                <div class="ni" data-s="search"><svg viewBox="0 0 24 24">
                        <path
                            d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>全文検索</div>
            </div>
        </div>
        <div class="mn">
            <div class="tb">
                <div class="sb-x"><svg viewBox="0 0 24 24">
                        <path
                            d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>
                    <input type="text" id="gs" placeholder="質問・キーワードで横断検索 (Ctrl+K)" autocomplete="off">
                </div>
            </div>
            <div class="ct" id="ct"></div>
        </div>
    </div>
    <script>
        const I = {
            dash: '<svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>',
            sim: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2"/></svg>',
            deep: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
            fire: '<svg viewBox="0 0 24 24"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67z"/></svg>',
            chev: '<svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>',
            check: '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
        };
        const DB = {
            questions: [
                { id: 1, cat: "自己紹介", q: "1分程度で自己紹介をお願いします。", diff: "B", time: 60, req: true, a: "広島大学工学部第二類（機械系）の下村優斗です。大学では機械工学を専攻し、旋盤等の工作機械を用いた金属加工実習に没頭しました。同時に、独学でプログラミングを学び、日々の学習と情報管理を一元化する自作のAIシステムを構築しています。また、体育会馬術部に4年間在籍し、毎朝5時からの早朝作業を無遅刻で継続しました。『未知を恐れず学び続ける探求心』と『泥臭い現場で粘り強くやり抜く力』が私の武器です。", hints: ["機械×IT×馬術の三本柱", "1分=約300字", "結論→根拠→意欲"], deepdive: [{ q: "なぜ機械工学を選んだ？", a: "モノづくりへの純粋な興味。実際に手を動かして形にする過程に魅力を感じました。" }, { q: "馬術部に入ったきっかけは？", a: "全く未知の分野への好奇心。言葉の通じない生き物と向き合う経験が自分を成長させると直感しました。" }] },
                { id: 2, cat: "強み・弱み", q: "最大の強みと弱みを教えてください。", diff: "B", time: 90, req: true, a: "強みは『未知への探求心と構造化能力』。複雑な情報を整理し、自ら課題を設定して解決策を実装する力があります。自作システムをPythonで構築しました。弱みは『過集中』。没頭すると周囲が見えなくなりますが、タスク管理システムで時間を区切り定期的に俯瞰する習慣で対処しています。", hints: ["弱みは克服の仕組みとセット", "具体エピソードで証明"], deepdive: [{ q: "構造化能力の具体例は？", a: "45社以上の企業情報を業界別・選考段階別にマークダウンで構造化し比較分析できるDBを自作しました。" }, { q: "過集中で困った経験は？", a: "個人開発に没頭し睡眠を削って体調を崩した経験があり、以降作業時間に上限ルールを課しています。" }] },
                { id: 3, cat: "ガクチカ", q: "学生時代に最も力を入れたことは？", diff: "B", time: 90, req: true, a: "体育会馬術部にて4年間一日も欠かさず早朝5時からの作業・練習に取り組みました。馬の個体ごとに接し方を変え、怖がりな馬には穏やかに、サボり癖のある馬には強い指示を出すなど『入力インターフェース』を個体仕様に合わせました。この経験で『相手の僅かな反応を察知する観察力』と『どんな環境でもやり遂げるタフネス』を獲得しました。", hints: ["STAR構造", "馬=非言語コミュニケーション訓練", "個別最適化"], deepdive: [{ q: "なぜ4年間辞めなかった？", a: "『分からないからこそもっと知りたい』という好奇心。根性論ではなく未知の対象への面白さが原動力。" }, { q: "馬術がエンジニアにどう活きる？", a: "現場ごとに文化も技術も異なる環境への適応力。馬の個体ごとに接し方を変えたように、コミュニケーションチャンネルを切り替える力。" }, { q: "具体的にどう接し方を変えた？", a: "怖がりな馬は手綱を強く引くとパニック、サボる馬は強い指示が必要。『このシステムにどういう信号を送れば最良の反応を返すか』を分析しました。" }] },

<div id="sr">${q ? doS(q) : '<div class="cd"><p style="color:var(--tx2)">検索バーにキーワードを入力</p></div>'}</div>`;
        }
        function doS(query) {
            if (!query) return ''; const q = query.toLowerCase(); let r = [];
            DB.questions.forEach(it => {
                let m = [];
                if (it.q.toLowerCase().includes(q)) m.push({ f: '質問', t: it.q });
                if (it.a.toLowerCase().includes(q)) m.push({ f: '回答', t: it.a });
                it.hints.forEach(h => { if (h.toLowerCase().includes(q)) m.push({ f: 'ヒント', t: h }) });
                it.deepdive.forEach(d => { if (d.q.toLowerCase().includes(q)) m.push({ f: '深掘Q', t: d.q }); if (d.a.toLowerCase().includes(q)) m.push({ f: '深掘A', t: d.a }) });
                if (m.length) r.push({ ty: 'q', it, m })
            });
            Object.entries(DB.companies).forEach(([n, co]) => {
                let m = [];
                if (n.toLowerCase().includes(q)) m.push({ f: '企業', t: n });
                co.k.forEach(p => { if (p.toLowerCase().includes(q)) m.push({ f: 'Key', t: p }) });
                co.rq.forEach(x => { if (x.toLowerCase().includes(q)) m.push({ f: '逆質問', t: x }) });
                if (m.length) r.push({ ty: 'c', n, m })
            });
            if (!r.length) return `<div class="cd"><p>「${esc(query)}」の結果なし</p></div>`;
            return `<div class="sub">${r.length}件</div>` + r.map(x => {
                if (x.ty === 'q') return `<div class="cd"><span class="bg bg-${x.it.diff.toLowerCase()}">${x.it.diff}</span><h3>${x.it.cat}: ${x.it.q}</h3>${x.m.map(m => `<p style="margin-top:3px;font-size:11px"><span style="color:var(--ac3)">[${m.f}]</span> ${hl(m.t, query)}</p>`).join('')}</div>`;
                return `<div class="cd"><h3 style="color:var(--ac3)">${x.n}</h3>${x.m.map(m => `<p style="margin-top:3px;font-size:11px"><span style="color:var(--ac3)">[${m.f}]</span> ${hl(m.t, query)}</p>`).join('')}</div>`;
            }).join('');
        }
        function hl(t, q) { return esc(t).replace(new RegExp('(' + eR(q) + ')', 'gi'), '<span class="hl">$1</span>') }
        function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }
        function eR(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') }
        function mP(id) { S.p[id] = Date.now(); localStorage.setItem('p', JSON.stringify(S.p)) }
        let tR = false;
        function tT() { if (tR) { clearInterval(S.ti); tR = false } else { S.ti = setInterval(() => { S.tv++; const e = $('tm'); if (e) { e.textContent = Math.floor(S.tv / 60) + ':' + String(S.tv % 60).padStart(2, '0'); if (S.tv > DB.questions[S.si].time) e.style.color = 'var(--err)' } }, 1000); tR = true } }
        function rT() { clearInterval(S.ti); tR = false; S.tv = 0; const e = $('tm'); if (e) { e.textContent = '0:00'; e.style.color = 'var(--ac3)' } }
        document.querySelectorAll('.ni').forEach(n => n.addEventListener('click', () => { S.sec = n.dataset.s; rT(); R() }));
        $('gs').addEventListener('input', () => { if (S.sec !== 'search') { S.sec = 'search'; document.querySelectorAll('.ni').forEach(n => n.classList.toggle('on', n.dataset.s === 'search')) } R() });
        document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); $('gs').focus() } });
        R();
    </script>
</body>

</html>
