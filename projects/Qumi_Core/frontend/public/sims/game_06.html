<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUMI SYSTEM 3D - CAD ARCHITECTURE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #00D4FF;
            text-shadow: 0 0 10px #00D4FF; pointer-events: none;
            font-size: 12px; letter-spacing: 2px;
        }
        #stats {
            position: absolute; bottom: 20px; right: 20px; color: #00FF99;
            font-size: 10px; text-align: right; pointer-events: none;
        }
        .hud-line { height: 1px; background: rgba(0, 212, 255, 0.3); margin: 5px 0; }
    </style>
</head>
<body>
    <div id="overlay">
        // QUMI SYSTEM 3D ARCHITECTURE<br>
        [ STATUS: SCANNING CAD TOPOLOGY ]
        <div class="hud-line" style="width: 200px;"></div>
        COORDINATE_AXIS: X:Y:Z<br>
        SLOT_COUNT: 12 UNIT<br>
        NODE_SYNC: EXTERNAL BRAIN
    </div>
    <div id="stats">
        LATENCY: 12ms<br>
        CORE_LOAD: 0.08%
    </div>
    <div id="canvas-container"></div>

    <script>
        // Three.js Scene Setup (CAD Mode)
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // CAD Grid Helper
        const gridHelper = new THREE.GridHelper(50, 50, 0x00D4FF, 0x222222);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Axis Helper (CAD like)
        const axesHelper = new THREE.AxesHelper(5);
        scene.add(axesHelper);

        // Slots Data (from App.tsx architecture)
        const slots = [
            { pos: [-10, 5, -10], color: 0x00F0FF, name: 'CORE LOG' },
            { pos: [-10, 5, 0],   color: 0xB026FF, name: 'SOUL HUB' },
            { pos: [-10, 5, 10],  color: 0xFF5C93, name: 'KNOWLEDGE' },
            { pos: [0, 5, -10],   color: 0xFF0055, name: 'SYSTEM 3D' },
            { pos: [0, 5, 0],     color: 0x00D4FF, name: 'SWARM FLOW' },
            { pos: [0, 5, 10],    color: 0xFF9E00, name: 'TOPOLOGY' },
            { pos: [10, 5, -10],  color: 0x00FF99, name: 'VOICE SENSE' }
        ];

        const nodeGroup = new THREE.Group();
        scene.add(nodeGroup);

        slots.forEach(slot => {
            // Create Node (Box for CAD look)
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshBasicMaterial({ 
                color: slot.color, 
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(...slot.pos);
            nodeGroup.add(cube);

            // Inner Core
            const coreGeom = new THREE.SphereGeometry(0.5, 16, 16);
            const coreMat = new THREE.MeshBasicMaterial({ color: slot.color });
            const core = new THREE.Mesh(coreGeom, coreMat);
            cube.add(core);

            // Connections (Line to Center)
            const points = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(...slot.pos)];
            const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: slot.color, transparent: true, opacity: 0.2 });
            const line = new THREE.Line(lineGeom, lineMat);
            scene.add(line);
        });

        // Background Particles
        const particlesGeom = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i=0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        particlesGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 0.1, color: 0x00D4FF });
        const particlesMesh = new THREE.Points(particlesGeom, particlesMat);
        scene.add(particlesMesh);

        function animate() {
            requestAnimationFrame(animate);
            nodeGroup.children.forEach((node, i) => {
                node.rotation.x += 0.01;
                node.rotation.y += 0.01;
                node.position.y = slots[i % slots.length].pos[1] + Math.sin(Date.now() * 0.001 + i) * 0.5;
            });
            particlesMesh.rotation.y += 0.0005;
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
