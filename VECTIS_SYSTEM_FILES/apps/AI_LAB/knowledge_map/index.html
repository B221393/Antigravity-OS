<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>EGO MAPPER: Knowledge Tree</title>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #canvas {
            width: 100vw;
            height: 100vh;
        }

        .node circle {
            fill: #3b82f6;
            stroke: #fff;
            stroke-width: 2px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .node text {
            font: 12px sans-serif;
            fill: #cbd5e1;
            pointer-events: none;
            text-shadow: 0 1px 4px #000;
        }

        .link {
            fill: none;
            stroke: #475569;
            stroke-width: 1.5px;
            opacity: 0.6;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: auto;
            background: rgba(15, 23, 42, 0.8);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            margin: 5px 0 10px 0;
        }

        /* Genre Colors */
        .genre-tech circle {
            fill: #10b981;
        }

        .genre-finance circle {
            fill: #f59e0b;
        }

        .genre-news circle {
            fill: #ec4899;
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <div class="header">
        <h1>EGO MAPPER</h1>
        <p>2D Branching Knowledge Visualization</p>
        <input type="text" id="searchBox" placeholder="Search topics..."
            style="background: #1e293b; border: 1px solid #475569; color: white; padding: 5px; border-radius: 4px; width: 200px;">
    </div>
    <div id="canvas"></div>

    <script>
        // Sample Data
        const data = {
            name: "EGO ARCHIVE",
            children: [
                {
                    name: "TECHNOLOGY", className: "genre-tech",
                    children: [{ name: "AI Agents" }, { name: "LLM Optimization" }, { name: "Python 3.12" }]
                },
                {
                    name: "FINANCE", className: "genre-finance",
                    children: [{ name: "Market Trends" }, { name: "Crypto Assets" }]
                },
                {
                    name: "SYSTEM", className: "genre-news",
                    children: [{ name: "Ollama Config" }, { name: "Cohere API" }, { name: "Gemini 2.0" }, { name: "Memory Management" }]
                },
                {
                    name: "CREATIVE", className: "genre-tech",
                    children: [{ name: "UI Design" }, { name: "D3.js Visualization" }]
                }
            ]
        };

        const width = window.innerWidth;
        const height = window.innerHeight;
        let i = 0;
        const duration = 750;
        let root;

        const svg = d3.select("#canvas").append("svg")
            .attr("width", width)
            .attr("height", height)
            .call(d3.zoom().on("zoom", (event) => g.attr("transform", event.transform)))
            .append("g")
            .attr("transform", `translate(100, ${height / 2})`);

        const g = svg.append("g");

        // Define marker for arrows if needed, mostly for DAGs but nice to have in code

        const linkGroup = g.append("g").attr("class", "links");
        const nodeGroup = g.append("g").attr("class", "nodes");

        const tree = d3.tree().size([height - 100, width - 400]);
        root = d3.hierarchy(data, d => d.children);
        root.x0 = height / 2;
        root.y0 = 0;

        // Initial Layout
        update(root);

        // Collapse helper (optional usage)
        function collapse(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapse);
                d.children = null;
            }
        }

        function update(source) {
            const treeData = tree(root);
            const nodes = treeData.descendants();
            const links = treeData.links();

            // Normalize for fixed depth
            nodes.forEach(d => d.y = d.depth * 250);

            // --- NODES ---
            const node = nodeGroup.selectAll('g.node')
                .data(nodes, d => d.id || (d.id = ++i));

            const nodeEnter = node.enter().append('g')
                .attr('class', d => "node " + (d.data.className || ""))
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on('click', click);

            nodeEnter.append('circle')
                .attr('class', 'node')
                .attr('r', 1e-6)
                .style("fill", d => d._children ? "#3b82f6" : "#fff");

            nodeEnter.append('text')
                .attr("dy", ".35em")
                .attr("x", d => d.children || d._children ? -13 : 13)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name)
                .style('fill-opacity', 1e-6);

            const nodeUpdate = node.merge(nodeEnter).transition().duration(duration)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            nodeUpdate.select('circle.node')
                .attr('r', 10)
                .style("fill", d => d._children ? "#3b82f6" : "#0f172a");

            nodeUpdate.select('text')
                .style("fill-opacity", 1);

            const nodeExit = node.exit().transition().duration(duration)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            nodeExit.select('circle').attr('r', 1e-6);
            nodeExit.select('text').style('fill-opacity', 1e-6);

            // --- LINKS ---
            const link = linkGroup.selectAll('path.link')
                .data(links, d => d.target.id);

            const linkEnter = link.enter().append('path')
                .attr("class", "link")
                .attr('d', d => {
                    const o = { x: source.x0, y: source.y0 };
                    return diagonal(o, o);
                });

            const linkUpdate = link.merge(linkEnter).transition().duration(duration)
                .attr('d', d => diagonal(d.source, d.target));

            const linkExit = link.exit().transition().duration(duration)
                .attr('d', d => {
                    const o = { x: source.x, y: source.y };
                    return diagonal(o, o);
                })
                .remove();

            nodes.forEach(d => {
                d.x0 = d.x;
                d.y0 = d.y;
            });
        }

        function diagonal(s, d) {
            return `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
        }

        function click(event, d) {
            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }
            update(d);
        }

        // Search Logic
        document.getElementById('searchBox').addEventListener('input', function (e) {
            const term = e.target.value.toLowerCase();
            if (!term) {
                d3.selectAll('circle').style("stroke", "#fff").style("stroke-width", "2px");
                d3.selectAll('text').style("fill", "#cbd5e1").style("font-weight", "normal");
                return;
            }

            d3.selectAll('g.node').each(function (d) {
                const match = d.data.name.toLowerCase().includes(term);
                const circle = d3.select(this).select('circle');
                const text = d3.select(this).select('text');

                if (match) {
                    circle.style("stroke", "#f59e0b").style("stroke-width", "4px").style("fill", "#fff");
                    text.style("fill", "#f59e0b").style("font-weight", "bold");

                    // Expand parents to show match (Recursive)
                    let parent = d.parent;
                    while (parent) {
                        if (parent._children) {
                            parent.children = parent._children;
                            parent._children = null;
                            update(parent); // Trigger visual update
                        }
                        parent = parent.parent;
                    }
                } else {
                    circle.style("stroke", "#475569").style("stroke-width", "1px");
                    text.style("fill", "#475569");
                }
            });
        });

    </script>
</body>

</html>
