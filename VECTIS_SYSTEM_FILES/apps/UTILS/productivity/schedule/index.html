<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>VECTIS CALENDAR</title>
    <style>
        :root {
            --bg: #0f172a;
            --header: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --today: #3b82f6;
            --event-job: #f59e0b;
            /* Amber */
            --event-gen: #10b981;
            /* Emerald */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 15px 20px;
            background: var(--header);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Grid */
        .cal-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: 40px repeat(6, 1fr);
            gap: 1px;
            background: var(--border);
            overflow: auto;
        }

        .day-header {
            background: var(--header);
            text-align: center;
            line-height: 40px;
            font-weight: bold;
            color: #94a3b8;
        }

        .day-cell {
            background: var(--bg);
            padding: 5px;
            position: relative;
            min-height: 80px;
            transition: 0.2s;
        }

        .day-cell:hover {
            background: #152033;
        }

        .day-num {
            font-size: 14px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 50%;
            width: 20px;
            text-align: center;
        }

        .is-today .day-num {
            background: var(--today);
            color: white;
        }

        .is-other-month {
            opacity: 0.3;
        }

        .event {
            font-size: 11px;
            margin-top: 2px;
            padding: 2px 4px;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .type-JOB {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border-left: 2px solid #fbbf24;
        }

        .type-GEN {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border-left: 2px solid #34d399;
        }

        /* Sidebar/Details */
        #details {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            border: 1px solid #475569;
            padding: 20px;
            width: 300px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            z-index: 100;
        }

        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }
    </style>
</head>

<body>

    <header>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
            <h1 id="monthYear">January 2026</h1>
            <button class="nav-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <button class="nav-btn" onclick="location.reload()">Sync Data</button>
    </header>

    <div class="cal-grid" id="grid">
        <!-- Generated by JS -->
    </div>

    <div class="overlay" id="overlay" onclick="closeDetails()"></div>
    <div id="details">
        <h3 id="det-title" style="margin-top:0;">Event Title</h3>
        <p id="det-date" style="color:#94a3b8; font-size:12px;">2026-01-01</p>
        <hr style="border:0; border-top:1px solid #333;">
        <p id="det-desc">Description here...</p>
        <button class="nav-btn" onclick="closeDetails()" style="width:100%; margin-top:10px;">Close</button>
    </div>

    <script>
        let currentDate = new Date();
        // Default Data
        let events = [];

        // Try to load from "precog_schedules.json" (via fetch if served? Or just localStorage simulation for now)
        // Since we are pure HTML, we'll try to fetch the JSON file relative path.
        // Assuming this is in apps/UTILS/schedule/calendar.html, and data is in ../../schedule_magi/data/precog_schedules.json?
        // Path resolution might be tricky. Let's try root fetch or mock for now, and handle real sync later.

        async function loadData() {
            try {
                // Attempt to fetch from probable location
                const res = await fetch('../../../data/precog_schedules.json');
                if (res.ok) {
                    events = await res.json();
                } else {
                    // Mock/Fallback
                    console.warn("Using sample data, failed to fetch real JSON");
                    events = [
                        { Date: "2026-01-22", Event: "ES Deadline (Sony)", Type: "JOB" },
                        { Date: "2026-01-25", Event: "Weekly Review", Type: "GEN" }
                    ];
                }
            } catch (e) { console.error(e); }
            renderCal();
        }

        function renderCal() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('monthYear').textContent =
                new Date(year, month).toLocaleString('en-US', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);

            const startDayIndex = firstDay.getDay(); // 0 = Sun
            const daysInMonth = lastDay.getDate();

            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            // Headers
            ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].forEach(d => {
                const h = document.createElement('div');
                h.className = 'day-header';
                h.textContent = d;
                grid.appendChild(h);
            });

            // Prev Month Padding
            for (let i = 0; i < startDayIndex; i++) {
                const d = document.createElement('div');
                d.className = 'day-cell is-other-month';
                grid.appendChild(d);
            }

            // Days
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                const isToday = new Date().toDateString() === new Date(year, month, d).toDateString();
                if (isToday) cell.classList.add('is-today');

                cell.innerHTML = `<div class="day-num">${d}</div>`;

                // Events
                const daysEvents = events.filter(e => e.Date === dateStr);
                daysEvents.forEach(e => {
                    const ev = document.createElement('div');
                    ev.className = `event type-${e.Type || 'GEN'}`;
                    ev.textContent = e.Event;
                    ev.onclick = () => showDetails(e);
                    cell.appendChild(ev);
                });

                grid.appendChild(cell);
            }
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCal();
        }

        function showDetails(e) {
            document.getElementById('det-title').textContent = e.Event;
            document.getElementById('det-date').textContent = `${e.Date} ${e.Time || ''}`;
            document.getElementById('det-desc').textContent = e.details || "No additional details.";
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('details').style.display = 'block';
        }

        function closeDetails() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('details').style.display = 'none';
        }

        loadData();
    </script>
</body>

</html>
